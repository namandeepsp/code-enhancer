services:
  app:
    build:
      context: .
      dockerfile: dockerfile
    ports:
      - "${PORT:-8000}:8000"
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - TESTING=${TESTING:-false}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
      - DEEPSEEK_TIMEOUT=${DEEPSEEK_TIMEOUT:-30}
      - API_KEY=${API_KEY:-}
      - CACHE_PATH=/app/.cache/
      - CACHE_TTL_HOURS=${CACHE_TTL_HOURS:-24}
      - CACHE_SIZE_LIMIT_MB=${CACHE_SIZE_LIMIT_MB:-500}
      - RATE_LIMIT_RPM=${RATE_LIMIT_RPM:-30}
      - MAX_VARIANTS=${MAX_VARIANTS:-3}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - PYTHONUNBUFFERED=1
    volumes:
      # Persist cache across container restarts
      - cache_data:/app/.cache
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    mem_limit: 512m
    cpus: "0.5"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  cache_data:
